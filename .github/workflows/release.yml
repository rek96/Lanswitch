name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Import code signing certificate
        if: env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          if ($env:WINDOWS_CERTIFICATE) {
            New-Item -ItemType Directory -Force -Path certificate | Out-Null
            Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
            certutil -decode certificate/tempCert.txt certificate/certificate.pfx
            Remove-Item certificate/tempCert.txt
            Import-PfxCertificate -FilePath certificate/certificate.pfx `
              -CertStoreLocation Cert:\CurrentUser\My `
              -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)
          }

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2" --force

      - name: Build Windows installer
        shell: pwsh
        run: .\scripts\build-release.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lanswitch-windows
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2" --force

      - name: Build macOS bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_SIGNING_IDENTITY || '-' }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
        run: bash ./scripts/build-release.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lanswitch-macos
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app
